name = "cloud"
compatibility_date = "2026-06-08"
main = "backend/index.ts"

[[d1_databases]]
binding = "DB"
database_name = "cloudcalf"
database_id = "local"
migrations_dir = "../db/migrations"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]
